# Log Linter Configuration
# https://github.com/HACK3R911/go-logs-linter

rules:
  # Allow log messages to start with uppercase letter
  # Default: false
  allow_uppercase_start: false

  # Regex patterns that log messages must match
  # If specified, messages MUST match at least one pattern
  # Default: []
  # allowed_patterns:
  #   - "^\\[INFO\\]"
  #   - "^\\[WARN\\]"
  allowed_patterns: []

  # Regex patterns that log messages must NOT match
  # Default: []
  # disallowed_patterns:
  #   - "TODO"
  #   - "FIXME"
  disallowed_patterns: []

  # Allow non-English characters in log messages
  # Default: false
  allow_non_english: false

  # Allow special characters (non-alphanumeric, non-whitespace)
  # Default: false
  allow_special_chars: false

  # Allow potentially sensitive data in log messages
  # Default: false
  allow_sensitive_data: false

  # Keywords that indicate sensitive data
  # Used when allow_sensitive_data is false
  # Default: ["password", "token", "secret", "key", "api_key", "apikey"]
  sensitive_keywords:
    - password
    - token
    - secret
    - key
    - api_key
    - apiKey
    - private
    - credential